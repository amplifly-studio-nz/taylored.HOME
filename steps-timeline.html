<!--
  taylored.HOME — Mobile bottom tab bar
  -------------------------------------
  REQUIRES: _shared.css in the app header.
  PASTE TARGET: App settings → Custom code → Footer.

  Why this exists:
    Softr's default Navigation block doesn't render as an iOS-style fixed
    bottom tab bar. This snippet adds one for ≤768px viewports only, with
    the five owner tabs from the design.
-->

<nav class="t-tabbar" aria-label="Main">
  <a class="t-tabbar__tab" href="/dashboard"  data-tab="dashboard">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>Dashboard</span>
  </a>
  <a class="t-tabbar__tab" href="/steps" data-tab="steps">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><circle cx="6" cy="6" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="6" cy="18" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="18" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 6h6M8 18h6M14 12h2" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
    <span>Steps</span>
  </a>
  <a class="t-tabbar__tab" href="/documents" data-tab="documents">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M6 3h9l4 4v14H6z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M14 3v5h5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>Docs</span>
  </a>
  <a class="t-tabbar__tab" href="/walkthrough" data-tab="walkthrough">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>Walkthrough</span>
  </a>
  <a class="t-tabbar__tab" href="/contact" data-tab="contact">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M5 4h3l2 5-2 1a11 11 0 0 0 6 6l1-2 5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>Contact</span>
  </a>
</nav>

<style>
  .t-tabbar { display: none; }
  @media (max-width: 768px) {
    .t-tabbar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--t-paper, #FFFFFF);
      border-top: 1px solid var(--t-line, #E5E1D7);
      padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
    }
    .t-tabbar__tab {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px;
      padding: 6px 0;
      color: var(--t-ink-lt, #6B6B6B);
      font-family: var(--t-font-body, "Inter", sans-serif);
      font-size: 10px;
      font-weight: 500;
      text-decoration: none;
    }
    .t-tabbar__tab.is-active { color: var(--t-ink, #2B2B2B); }
    .t-tabbar__tab.is-active svg path,
    .t-tabbar__tab.is-active svg circle,
    .t-tabbar__tab.is-active svg rect { stroke: var(--t-citron-deep, #B8E62E); }
    body { padding-bottom: 64px; }
  }
</style>

<script>
(function () {
  var path = (window.location.pathname || '').toLowerCase();
  document.querySelectorAll('.t-tabbar__tab').forEach(function (tab) {
    var href = (tab.getAttribute('href') || '').toLowerCase();
    if (path === href || (href !== '/' && path.indexOf(href) === 0)) {
      tab.classList.add('is-active');
    }
  });
})();
</script>
